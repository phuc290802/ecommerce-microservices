apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: DB_DSN
              value: "user:password@tcp(mysql:3306)/ecommerce?charset=utf8mb4&parseTime=true"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: JWT_SECRET
              value: "supersecret"
            - name: PORT
              value: "8084"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
