apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff-service
  template:
    metadata:
      labels:
        app: bff-service
    spec:
      containers:
        - name: bff-service
          image: bff-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8081"
            - name: CATEGORY_SERVICE_URL
              value: "http://category-service:8085"
            - name: REVIEW_SERVICE_URL
              value: "http://review-service:8086"
            - name: STOCK_SERVICE_URL
              value: "http://stock-service:8087"
            - name: CART_SERVICE_URL
              value: "http://cart-service:8090"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: PORT
              value: "8083"
---
apiVersion: v1
kind: Service
metadata:
  name: bff-service
spec:
  selector:
    app: bff-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
